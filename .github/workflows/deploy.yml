name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly redeploy so the GitHub/Letterboxd live widgets stay fresh
    # even without a code push.
    - cron: '0 12 * * 1'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      # Refresh GitHub/Letterboxd widgets at deploy time; a failed fetch keeps
      # the committed snapshot, so this never blocks a deploy.
      - run: npm run fetch:live
        continue-on-error: true
      - run: npm run build
        env:
          VITE_CESIUM_ION_TOKEN: ${{ secrets.VITE_CESIUM_ION_TOKEN }}
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e -- --project=chromium --project=mobile
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v5
