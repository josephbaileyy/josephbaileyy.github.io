<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, Menlo, monospace">
  <defs>
    <radialGradient id="e-ocean" cx="42%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#2f7fd1"/>
      <stop offset="70%" stop-color="#1d5f9e"/>
      <stop offset="100%" stop-color="#123c6b"/>
    </radialGradient>
    <clipPath id="e-globe">
      <circle cx="800" cy="500" r="380"/>
    </clipPath>
  </defs>

  <!-- atmosphere -->
  <circle cx="800" cy="500" r="402" fill="none" stroke="#7fd4ff" stroke-width="10" opacity="0.12"/>
  <circle cx="800" cy="500" r="392" fill="none" stroke="#7fd4ff" stroke-width="4" opacity="0.3"/>

  <!-- ocean -->
  <circle cx="800" cy="500" r="380" fill="url(#e-ocean)"/>

  <g clip-path="url(#e-globe)">
    <!-- north america -->
    <path d="M 520 290 Q 580 240 660 250 Q 740 256 760 300 Q 790 330 760 360
             Q 730 380 710 420 Q 690 470 650 480 Q 628 460 632 428
             Q 600 430 575 405 Q 540 380 540 340 Q 510 320 520 290 Z" fill="#3e8f5a"/>
    <!-- central america isthmus -->
    <path d="M 650 482 Q 672 492 690 516 Q 700 530 692 540 Q 676 528 662 512 Q 650 498 650 482 Z" fill="#3e8f5a"/>
    <!-- south america -->
    <path d="M 692 542 Q 740 528 770 560 Q 786 600 770 650 Q 752 700 720 730 Q 700 736 692 706
             Q 680 660 676 612 Q 672 568 692 542 Z" fill="#56a06b"/>
    <!-- greenland -->
    <path d="M 790 210 Q 830 192 866 212 Q 880 236 860 258 Q 826 268 800 252 Q 782 232 790 210 Z" fill="#dfe8f4"/>
    <!-- europe + africa -->
    <path d="M 960 280 Q 1010 260 1050 282 Q 1064 304 1044 322 Q 1070 330 1090 360
             Q 1110 410 1090 470 Q 1066 540 1020 580 Q 990 596 972 560
             Q 950 500 946 440 Q 920 420 930 380 Q 916 340 940 312 Q 946 292 960 280 Z" fill="#c9a35f"/>
    <path d="M 980 300 Q 1020 286 1040 300 Q 1030 316 1004 318 Q 986 314 980 300 Z" fill="#3e8f5a"/>
    <!-- asia (eastern limb) -->
    <path d="M 1090 300 Q 1140 280 1175 310 Q 1190 350 1172 390 Q 1150 420 1120 410 Q 1100 380 1104 348 Q 1086 326 1090 300 Z" fill="#56a06b"/>
    <!-- australia hint -->
    <ellipse cx="1130" cy="650" rx="46" ry="28" fill="#c9a35f"/>
    <!-- ice caps -->
    <ellipse cx="800" cy="138" rx="180" ry="46" fill="#eef6ff" opacity="0.9"/>
    <ellipse cx="800" cy="868" rx="210" ry="52" fill="#eef6ff" opacity="0.85"/>
    <!-- clouds -->
    <g fill="#ffffff" opacity="0.14">
      <ellipse cx="640" cy="560" rx="130" ry="26" transform="rotate(-12 640 560)"/>
      <ellipse cx="920" cy="350" rx="150" ry="24" transform="rotate(8 920 350)"/>
      <ellipse cx="850" cy="700" rx="120" ry="22" transform="rotate(-6 850 700)"/>
    </g>
    <!-- night-side terminator -->
    <ellipse cx="1140" cy="500" rx="160" ry="390" fill="#070a1c" opacity="0.22"/>
  </g>

  <!-- ======== Stanford beacon: gateway scene ======== -->
  <rect id="anchor-stanford" x="585" y="383.75" width="90" height="56.25"/>
  <g transform="translate(630 412)">
    <circle r="5" fill="#ff5a5a"/>
    <circle r="12" fill="none" stroke="#ff5a5a" stroke-width="2" opacity="0.8">
      <animate attributeName="r" values="8;20" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="16" fill="none" stroke="#ff5a5a" stroke-width="1.5" opacity="0.4">
      <animate attributeName="r" values="14;26" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <text x="24" y="-14" font-size="15" fill="#eef2ff" opacity="0.9">stanford, california</text>
    <text x="24" y="6" font-size="12" fill="#9aa3c7" opacity="0.7">click to visit campus</text>
    <g id="hotspot-stanford">
      <title>Zoom in to Stanford University</title>
      <circle r="46" fill="transparent"/>
    </g>
  </g>
</svg>
