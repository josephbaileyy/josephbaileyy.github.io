<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, Menlo, monospace">
  <defs>
    <linearGradient id="sc-wall" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1130"/>
      <stop offset="55%" stop-color="#1b1947"/>
      <stop offset="100%" stop-color="#251b4e"/>
    </linearGradient>
    <radialGradient id="sc-neb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4636a0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4636a0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sc-neb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#15506b" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#15506b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- wallpaper -->
  <rect width="1600" height="1000" fill="url(#sc-wall)"/>
  <circle cx="420" cy="320" r="340" fill="url(#sc-neb1)"/>
  <circle cx="1230" cy="680" r="380" fill="url(#sc-neb2)"/>
  <g fill="#eef2ff">
    <circle cx="180" cy="180" r="1.6" opacity="0.5"/><circle cx="480" cy="120" r="1.4" opacity="0.4"/>
    <circle cx="820" cy="200" r="1.7" opacity="0.5"/><circle cx="1180" cy="140" r="1.5" opacity="0.45"/>
    <circle cx="1460" cy="320" r="1.6" opacity="0.5"/><circle cx="280" cy="640" r="1.5" opacity="0.4"/>
    <circle cx="640" cy="820" r="1.6" opacity="0.45"/><circle cx="1080" cy="880" r="1.4" opacity="0.4"/>
  </g>

  <!-- wallpaper binary motif -->
  <g transform="translate(1180 300)" opacity="0.14">
    <ellipse rx="200" ry="70" fill="none" stroke="#eef2ff" stroke-width="3" stroke-dasharray="10 12"/>
    <circle cx="-115" cy="25" r="22" fill="#ffd479"/>
    <path d="M -96 18 C -40 -6 20 -34 64 -30" fill="none" stroke="#7fd4ff" stroke-width="6"/>
    <ellipse cx="88" cy="-25" rx="64" ry="24" fill="none" stroke="#7fd4ff" stroke-width="7"/>
    <circle cx="88" cy="-25" r="26" fill="#eef2ff"/>
  </g>

  <!-- menu bar -->
  <rect width="1600" height="36" fill="#11102a" opacity="0.92"/>
  <text x="20" y="25" font-size="15" fill="#9aa3c7">⬡ JB-OS ▸ universe.app</text>
  <text x="1580" y="25" font-size="15" fill="#9aa3c7" text-anchor="end">depth 5/5 · 21:34</text>

  <!-- where the real DOM window mounts -->
  <rect id="ui-mount" x="400" y="250" width="800" height="500" fill="none"/>

  <!-- dock -->
  <g>
    <rect x="540" y="916" width="520" height="64" rx="18" fill="#1b1740" opacity="0.85"/>
    <circle cx="606" cy="948" r="18" fill="#ffd479"/>
    <circle cx="702" cy="948" r="18" fill="#7fd4ff"/>
    <circle cx="798" cy="948" r="18" fill="#b83a3a"/>
    <circle cx="894" cy="948" r="18" fill="#4636a0"/>
    <circle cx="990" cy="948" r="18" fill="#eef2ff"/>
  </g>
</svg>
