<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, Menlo, monospace">
  <defs>
    <linearGradient id="r-screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b2a5e"/>
      <stop offset="60%" stop-color="#3b2a66"/>
      <stop offset="100%" stop-color="#15506b"/>
    </linearGradient>
    <radialGradient id="r-lamp" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd479" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffd479" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="r-screenglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7fd4ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7fd4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- walls & floor -->
  <rect width="1600" height="720" fill="#261e4e"/>
  <rect y="720" width="1600" height="280" fill="#191238"/>
  <rect y="712" width="1600" height="8" fill="#1f1842"/>
  <ellipse cx="800" cy="870" rx="430" ry="86" fill="#312a5e"/>
  <ellipse cx="800" cy="870" rx="330" ry="62" fill="none" stroke="#3b3470" stroke-width="3"/>

  <!-- ======== window: the night outside (callback to the start) ======== -->
  <g>
    <rect x="128" y="138" width="344" height="394" fill="#3a3560"/>
    <rect x="148" y="158" width="304" height="354" fill="#0b1026"/>
    <g fill="#eef2ff">
      <circle cx="200" cy="220" r="1.8" opacity="0.8"/><circle cx="270" cy="190" r="1.4" opacity="0.6"/>
      <circle cx="350" cy="240" r="1.6" opacity="0.7"/><circle cx="410" cy="200" r="1.5" opacity="0.6"/>
      <circle cx="240" cy="320" r="1.5" opacity="0.6"/><circle cx="390" cy="350" r="1.7" opacity="0.7"/>
      <circle cx="200" cy="430" r="1.4" opacity="0.5"/><circle cx="330" cy="460" r="1.5" opacity="0.6"/>
    </g>
    <!-- tiny galaxy out the window -->
    <g transform="translate(310 300) rotate(-20)">
      <ellipse rx="52" ry="17" fill="none" stroke="#4636a0" stroke-width="6" opacity="0.7"/>
      <ellipse rx="30" ry="9" fill="none" stroke="#5a78e6" stroke-width="4" opacity="0.5"/>
      <circle r="9" fill="#fff6dd" opacity="0.9"/>
    </g>
    <g transform="translate(410 420)">
      <circle r="14" fill="#eef2ff"/>
      <circle cx="6" cy="-3" r="12" fill="#0b1026"/>
    </g>
    <path d="M 300 158 L 300 512 M 148 335 L 452 335" stroke="#3a3560" stroke-width="10"/>
    <rect x="128" y="528" width="344" height="14" fill="#322d58"/>
  </g>

  <!-- ======== bookshelf ======== -->
  <g>
    <rect x="520" y="270" width="150" height="14" fill="#4a3828"/>
    <g>
      <rect x="528" y="218" width="16" height="52" fill="#b83a3a"/>
      <rect x="548" y="226" width="14" height="44" fill="#7fd4ff"/>
      <rect x="566" y="212" width="18" height="58" fill="#ffd479"/>
      <rect x="588" y="228" width="13" height="42" fill="#56a06b"/>
      <rect x="605" y="220" width="16" height="50" fill="#5a78e6"/>
      <rect x="625" y="232" width="14" height="38" fill="#cdd4f0"/>
    </g>
    <rect x="520" y="420" width="150" height="14" fill="#4a3828"/>
    <g>
      <rect x="530" y="372" width="15" height="48" fill="#56a06b"/>
      <rect x="549" y="364" width="17" height="56" fill="#b83a3a"/>
      <rect x="570" y="378" width="13" height="42" fill="#9aa3c7"/>
      <rect x="587" y="368" width="16" height="52" fill="#f6b756"/>
      <rect x="607" y="380" width="14" height="40" fill="#7fd4ff"/>
    </g>
  </g>

  <!-- ======== AM CVn poster (callback to the galaxy) ======== -->
  <g>
    <rect x="700" y="200" width="190" height="250" fill="#11102a" stroke="#3a3560" stroke-width="6"/>
    <ellipse cx="795" cy="300" rx="62" ry="22" fill="none" stroke="#4636a0" stroke-width="1.5" stroke-dasharray="4 5"/>
    <circle cx="760" cy="308" r="7" fill="#ffd479"/>
    <path d="M 766 305 C 780 298 794 292 806 293" fill="none" stroke="#7fd4ff" stroke-width="2"/>
    <ellipse cx="816" cy="292" rx="18" ry="7" fill="none" stroke="#7fd4ff" stroke-width="2" opacity="0.6"/>
    <circle cx="816" cy="292" r="8" fill="#eef2ff"/>
    <text x="795" y="380" text-anchor="middle" font-size="16" fill="#7fd4ff" letter-spacing="2">AM CVn</text>
    <text x="795" y="404" text-anchor="middle" font-size="11" fill="#9aa3c7">P_orb &lt; 65 min</text>
  </g>

  <!-- ======== stanford pennant ======== -->
  <g transform="translate(1080 230) rotate(4)">
    <polygon points="0,0 220,28 0,56" fill="#8c1515"/>
    <rect x="-8" y="-4" width="10" height="64" fill="#4a3828"/>
    <text x="24" y="36" font-size="20" fill="#eef2ff" font-weight="bold" letter-spacing="1">STANFORD</text>
  </g>

  <!-- ======== desk ======== -->
  <g>
    <rect x="600" y="610" width="740" height="24" fill="#6b4f3a"/>
    <rect x="600" y="634" width="740" height="8" fill="#54392a"/>
    <rect x="630" y="642" width="22" height="200" fill="#4a3828"/>
    <rect x="1288" y="642" width="22" height="200" fill="#4a3828"/>
  </g>

  <!-- lamp -->
  <g>
    <circle cx="1230" cy="540" r="150" fill="url(#r-lamp)"/>
    <rect x="1218" y="588" width="44" height="10" rx="4" fill="#2c2750"/>
    <path d="M 1240 590 L 1240 540 Q 1240 520 1222 514" stroke="#2c2750" stroke-width="8" fill="none"/>
    <path d="M 1196 486 L 1234 522 L 1206 542 Z" fill="#b83a3a"/>
    <circle cx="1212" cy="524" r="7" fill="#fff3c4"/>
  </g>

  <!-- mug -->
  <g>
    <rect x="1108" y="578" width="34" height="34" rx="4" fill="#8c1515"/>
    <path d="M 1142 586 Q 1158 594 1142 606" stroke="#8c1515" stroke-width="5" fill="none"/>
    <path d="M 1118 570 Q 1122 562 1118 556 M 1130 570 Q 1134 562 1130 556" stroke="#9aa3c7" stroke-width="2.5" fill="none" opacity="0.7"/>
  </g>

  <!-- ======== the computer: gateway scene ======== -->
  <g>
    <circle cx="960" cy="520" r="170" fill="url(#r-screenglow)"/>
    <rect x="888" y="472" width="144" height="96" rx="8" fill="#14122e"/>
    <rect id="anchor-screen" x="900" y="482.5" width="120" height="75"/>
    <rect x="900" y="482.5" width="120" height="75" fill="url(#r-screen)"/>
    <!-- tiny desktop hint on screen -->
    <rect x="900" y="482.5" width="120" height="7" fill="#11102a" opacity="0.9"/>
    <circle cx="942" cy="516" r="6" fill="#ffd479" opacity="0.7"/>
    <circle cx="976" cy="516" r="6" fill="#7fd4ff" opacity="0.7"/>
    <rect x="948" y="568" width="24" height="34" fill="#2c2750"/>
    <ellipse cx="960" cy="604" rx="42" ry="7" fill="#2c2750"/>
    <rect x="894" y="592" width="132" height="13" rx="5" fill="#2c2750"/>
    <text x="960" y="660" text-anchor="middle" font-size="15" fill="#7fd4ff" opacity="0.9">click the screen</text>
    <g id="hotspot-screen">
      <title>Zoom in to my computer screen</title>
      <rect x="876" y="460" width="168" height="150" fill="transparent"/>
    </g>
  </g>

  <!-- chair -->
  <g fill="#221c44">
    <rect x="744" y="640" width="150" height="22" rx="10"/>
    <rect x="730" y="540" width="26" height="170" rx="10"/>
    <rect x="724" y="510" width="38" height="48" rx="12"/>
    <rect x="794" y="662" width="18" height="120"/>
    <ellipse cx="803" cy="788" rx="64" ry="10"/>
  </g>
</svg>
