<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, Menlo, monospace">
  <defs>
    <radialGradient id="g-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff6dd" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#ffd479" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#4636a0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-wd" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#7fd4ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7fd4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff3c4" stop-opacity="1"/>
      <stop offset="55%" stop-color="#ffd479" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffd479" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ======== spiral galaxy ======== -->
  <g transform="translate(560 450) rotate(-18)">
    <ellipse rx="430" ry="150" fill="none" stroke="#2a2356" stroke-width="36" opacity="0.55"/>
    <ellipse rx="340" ry="112" fill="none" stroke="#4636a0" stroke-width="26" opacity="0.45"/>
    <ellipse rx="240" ry="76" fill="none" stroke="#5a78e6" stroke-width="16" opacity="0.3"/>
    <circle r="150" fill="url(#g-core)"/>
    <circle r="26" fill="#fff6dd"/>
    <g fill="#eef2ff">
      <circle cx="-380" cy="-58" r="2.4" opacity="0.9"/><circle cx="-310" cy="92" r="1.8" opacity="0.7"/>
      <circle cx="-258" cy="-104" r="2" opacity="0.8"/><circle cx="-160" cy="118" r="2.6" opacity="0.9"/>
      <circle cx="-92" cy="-128" r="1.7" opacity="0.6"/><circle cx="40" cy="132" r="2.2" opacity="0.85"/>
      <circle cx="148" cy="-116" r="2" opacity="0.75"/><circle cx="236" cy="96" r="2.5" opacity="0.9"/>
      <circle cx="318" cy="-72" r="1.8" opacity="0.65"/><circle cx="396" cy="44" r="2.2" opacity="0.8"/>
      <circle cx="-420" cy="30" r="1.6" opacity="0.6"/><circle cx="282" cy="124" r="1.6" opacity="0.6"/>
    </g>
    <g fill="#7fd4ff">
      <circle cx="-340" cy="40" r="1.6" opacity="0.7"/><circle cx="-196" cy="-92" r="1.8" opacity="0.7"/>
      <circle cx="96" cy="120" r="1.7" opacity="0.7"/><circle cx="352" cy="-30" r="1.7" opacity="0.7"/>
    </g>
  </g>
  <text x="560" y="680" text-anchor="middle" font-size="17" fill="#9aa3c7" opacity="0.75" letter-spacing="3">THE MILKY WAY</text>

  <!-- ======== pulsar (decor) ======== -->
  <g transform="translate(260 170)">
    <circle r="6" fill="#7fd4ff"/>
    <path d="M -34 -34 A 48 48 0 0 1 34 -34" fill="none" stroke="#7fd4ff" stroke-width="2" opacity="0.5"/>
    <path d="M -52 -52 A 74 74 0 0 1 52 -52" fill="none" stroke="#7fd4ff" stroke-width="2" opacity="0.3"/>
    <path d="M -34 34 A 48 48 0 0 0 34 34" fill="none" stroke="#7fd4ff" stroke-width="2" opacity="0.5"/>
    <path d="M -52 52 A 74 74 0 0 0 52 52" fill="none" stroke="#7fd4ff" stroke-width="2" opacity="0.3"/>
    <text y="92" text-anchor="middle" font-size="14" fill="#9aa3c7" opacity="0.55">pulsar</text>
  </g>

  <!-- ======== black hole (decor) ======== -->
  <g transform="translate(330 840)">
    <ellipse rx="52" ry="14" fill="none" stroke="#f6b756" stroke-width="3" opacity="0.7"/>
    <circle r="20" fill="#05060f"/>
    <circle r="20" fill="none" stroke="#ffd479" stroke-width="2" opacity="0.9"/>
    <text y="50" text-anchor="middle" font-size="14" fill="#9aa3c7" opacity="0.55">black hole</text>
  </g>

  <!-- ======== AM CVn binary — clickable research project ======== -->
  <g transform="translate(1230 270)">
    <ellipse rx="95" ry="34" fill="none" stroke="#4636a0" stroke-width="1.5" stroke-dasharray="5 6" opacity="0.8"/>
    <circle cx="-55" cy="12" r="9" fill="#ffd479"/>
    <path d="M -47 9 C -20 -2, 8 -16, 30 -14" fill="none" stroke="#7fd4ff" stroke-width="2.5" opacity="0.8"/>
    <ellipse cx="42" cy="-12" rx="30" ry="11" fill="none" stroke="#7fd4ff" stroke-width="3" opacity="0.55"/>
    <circle cx="42" cy="-12" r="42" fill="url(#g-wd)"/>
    <circle cx="42" cy="-12" r="12" fill="#eef2ff"/>
    <text y="78" text-anchor="middle" font-size="15" fill="#7fd4ff" opacity="0.85" letter-spacing="2">AM CVn</text>
    <text y="100" text-anchor="middle" font-size="12" fill="#9aa3c7" opacity="0.6">my research — click</text>
    <g id="hotspot-amcvn">
      <title>About my AM CVn research</title>
      <circle r="105" fill="transparent"/>
    </g>
  </g>

  <!-- ======== the Sun: gateway to the solar system ======== -->
  <rect id="anchor-solar" x="1010" y="588.75" width="100" height="62.5"/>
  <g transform="translate(1060 620)">
    <circle r="40" fill="url(#g-sun)"/>
    <path d="M 0 -16 L 3 -3 L 16 0 L 3 3 L 0 16 L -3 3 L -16 0 L -3 -3 Z" fill="#fff3c4"/>
    <circle r="4" fill="#ffd479"/>
    <text y="64" text-anchor="middle" font-size="14" fill="#ffd479" opacity="0.85">the Sun — you are here</text>
    <g id="hotspot-sun">
      <title>Zoom in to the Solar System</title>
      <circle r="52" fill="transparent"/>
    </g>
  </g>

  <!-- faint field stars -->
  <g fill="#eef2ff">
    <circle cx="120" cy="420" r="1.6" opacity="0.5"/><circle cx="980" cy="120" r="1.8" opacity="0.6"/>
    <circle cx="1480" cy="520" r="1.5" opacity="0.5"/><circle cx="760" cy="880" r="1.7" opacity="0.5"/>
    <circle cx="1340" cy="760" r="1.5" opacity="0.45"/><circle cx="80" cy="120" r="1.4" opacity="0.4"/>
    <circle cx="1520" cy="120" r="1.6" opacity="0.5"/><circle cx="620" cy="120" r="1.4" opacity="0.45"/>
  </g>
</svg>
